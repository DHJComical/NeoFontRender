def cosmicHostOs = System.getProperty('os.name', '').toLowerCase(Locale.ROOT)
def cosmicHostArch = System.getProperty('os.arch', '').toLowerCase(Locale.ROOT)
def cosmicArch = (cosmicHostArch == 'amd64' || cosmicHostArch == 'x86_64') ? 'x86_64' : (cosmicHostArch == 'aarch64' || cosmicHostArch == 'arm64') ? 'aarch64' : 'unsupported'
def cosmicPlatform = cosmicHostOs.contains('win') ? "windows-${cosmicArch}" : (cosmicHostOs.contains('mac') ? "macos-${cosmicArch}" : "linux-${cosmicArch}-gnu")
def cosmicLibraryName = cosmicHostOs.contains('win') ? 'neofontrender_cosmic.dll' : (cosmicHostOs.contains('mac') ? 'libneofontrender_cosmic.dylib' : 'libneofontrender_cosmic.so')
def cosmicHostLibrary = file("native/cosmic-text/target/release/${cosmicLibraryName}")
def cosmicBundleDir = providers.gradleProperty('cosmicNativeBundleDir')

tasks.register('buildCosmicNative', Exec) {
    group = 'build'
    description = 'Builds the cosmic-text JNI backend for the current host platform.'
    workingDir file('native/cosmic-text')
    commandLine 'cargo', 'build', '--release', '--locked'
    inputs.files(fileTree('native/cosmic-text/src'), file('native/cosmic-text/Cargo.toml'), file('native/cosmic-text/Cargo.lock'))
    outputs.file(cosmicHostLibrary)
    onlyIf { !cosmicBundleDir.isPresent() }
}

tasks.named('processResources') {
    if (cosmicBundleDir.isPresent()) {
        from(file(cosmicBundleDir.get())) { into 'assets/neofontrender/natives' }
    } else {
        dependsOn 'buildCosmicNative'
        from(cosmicHostLibrary) { into "assets/neofontrender/natives/${cosmicPlatform}" }
    }
}

tasks.register('skijaDebugPng', JavaExec) {
    group = 'verification'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'neofontrender.core.font.skia.SkijaDebugTextRenderer'
    args layout.buildDirectory.file('skija-debug/debug-font.png').get().asFile.absolutePath
}
tasks.register('skijaEmojiTest', JavaExec) {
    group = 'verification'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'neofontrender.core.font.skia.SkijaEmojiTest'
    args layout.buildDirectory.dir('skija-debug').get().asFile.absolutePath
