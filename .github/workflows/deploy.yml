name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish after a successful build
        required: false
        type: boolean
        default: false
  pull_request:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  cosmic-native:
    name: Cosmic ${{ matrix.resource }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            resource: windows-x86_64
            library: neofontrender_cosmic.dll
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            resource: linux-x86_64
            library: libneofontrender_cosmic.so
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            resource: linux-aarch64
            library: libneofontrender_cosmic.so
          - runner: macos-13
            target: x86_64-apple-darwin
            resource: macos-x86_64
            library: libneofontrender_cosmic.dylib
          - runner: macos-14
            target: aarch64-apple-darwin
            resource: macos-aarch64
            library: libneofontrender_cosmic.dylib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.91.1
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/cosmic-text
          key: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native library
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path native/cosmic-text/Cargo.toml \
            --release \
            --locked \
            --target "${{ matrix.target }}"
          mkdir -p "dist/${{ matrix.resource }}"
          cp "native/cosmic-text/target/${{ matrix.target }}/release/${{ matrix.library }}" \
            "dist/${{ matrix.resource }}/${{ matrix.library }}"

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-${{ matrix.resource }}
          # Upload the directory rather than the single file so merge-multiple retains the
          # resource path and same-named Linux/macOS libraries cannot overwrite each other.
          path: dist
          if-no-files-found: error
          retention-days: 7

  package:
    name: Package universal distributions
    needs: cosmic-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read gradle.properties
        uses: BrycensRanch/read-properties-action@v1
        id: properties
        with:
          file: gradle.properties
          all: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download all Cosmic natives
        uses: actions/download-artifact@v4
        with:
          pattern: cosmic-*
          path: cosmic-natives
          merge-multiple: true

      - name: Validate native bundle
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            windows-x86_64/neofontrender_cosmic.dll
            linux-x86_64/libneofontrender_cosmic.so
            linux-aarch64/libneofontrender_cosmic.so
            macos-x86_64/libneofontrender_cosmic.dylib
            macos-aarch64/libneofontrender_cosmic.dylib
          )
          for library in "${expected[@]}"; do
            test -s "cosmic-natives/${library}" || {
              echo "Missing Cosmic native: ${library}" >&2
              exit 1
            }
          done

      - name: Build distribution variants
        run: >-
          ./gradlew packageVariants
          -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"

      - name: Verify distribution contents
        shell: bash
        run: |
          set -euo pipefail
          full="build/libs/neofontrender-${{ steps.properties.outputs.mod_version }}-full.jar"
          core="build/libs/neofontrender-${{ steps.properties.outputs.mod_version }}-core.jar"
          resources="build/libs/neofontrender-resources-${{ steps.properties.outputs.mod_version }}.jar"
          skia="build/libs/neofontrender-skia-${{ steps.properties.outputs.mod_version }}.jar"
          for archive in "$full" "$core" "$resources" "$skia"; do
            test -s "$archive" || { echo "Missing distribution: $archive" >&2; exit 1; }
          done

          full_entries="$(jar tf "$full")"
          core_entries="$(jar tf "$core")"
          for entry in \
            assets/neofontrender/natives/windows-x86_64/neofontrender_cosmic.dll \
            assets/neofontrender/natives/linux-x86_64/libneofontrender_cosmic.so \
            assets/neofontrender/natives/linux-aarch64/libneofontrender_cosmic.so \
            assets/neofontrender/natives/macos-x86_64/libneofontrender_cosmic.dylib \
            assets/neofontrender/natives/macos-aarch64/libneofontrender_cosmic.dylib; do
            grep -Fxq "$entry" <<<"$full_entries" || {
              echo "Full JAR is missing $entry" >&2
              exit 1
            }
          done
          if grep -Eq '(^io/github/humbleui/|assets/neofontrender/fonts/.*\.ttf$)' <<<"$core_entries"; then
            echo "Core JAR contains Skija or bundled TTF content" >&2
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: neofontrender-${{ steps.properties.outputs.mod_version }}
          path: |
            build/libs/neofontrender-${{ steps.properties.outputs.mod_version }}-full.jar
            build/libs/neofontrender-${{ steps.properties.outputs.mod_version }}-core.jar
            build/libs/neofontrender-resources-${{ steps.properties.outputs.mod_version }}.jar
            build/libs/neofontrender-skia-${{ steps.properties.outputs.mod_version }}.jar
          if-no-files-found: error

      - name: Publish to Maven
        if: >-
          (github.event_name == 'push' || inputs.publish == true) &&
          steps.properties.outputs.publish_to_maven == 'true' &&
          steps.properties.outputs.publish_to_local_maven == 'true'
        run: >-
          ./gradlew publish
          -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"
          -P${{ steps.properties.outputs.maven_name }}Username=${{ secrets.MAVEN_USER }}
          -P${{ steps.properties.outputs.maven_name }}Password=${{ secrets.MAVEN_PASS }}

      - name: Publish full package to CurseForge
        if: >-
          (github.event_name == 'push' || inputs.publish == true) &&
          steps.properties.outputs.publish_to_curseforge == 'true'
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew curseforge -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"

      - name: Publish full package to Modrinth
        if: >-
          (github.event_name == 'push' || inputs.publish == true) &&
          steps.properties.outputs.publish_to_modrinth == 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew modrinth -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"
