name: UI Enhancements / Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag; must match ui-enhancements-v<version>'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'ui-enhancements-v*'

permissions:
  contents: write

concurrency:
  group: ui-enhancements-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish addon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission for Gradle wrapper
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve and validate release version
        id: release
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^ui_enhancements_version[[:space:]]*=[[:space:]]*//p' gradle.properties | tr -d '\r' | xargs)"
          expected="ui-enhancements-v${version}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${MANUAL_TAG}"
          fi
          if [[ "$tag" != "$expected" ]]; then
            echo "Release tag '$tag' does not match configured addon version '$expected'." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and test addon
        run: ./gradlew :addons:ui-enhancements:build --no-daemon

      - name: Validate and checksum installable JAR
        id: artifact
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          directory="addons/ui-enhancements/build/libs"
          filename="neofontrender-ui-enhancements-${VERSION}.jar"
          jar="${directory}/${filename}"
          test -s "$jar"
          entries="$(jar tf "$jar")"
          grep -Fxq 'mcmod.info' <<<"$entries"
          grep -Fxq 'mixins.neofontrender_ui_enhancements.json' <<<"$entries"
          grep -Fxq 'neofontrender/addons/mixin/UiEnhancementsMixinLoader.class' <<<"$entries"
          (cd "$directory" && sha256sum "$filename" > "${filename}.sha256")
          echo "jar=$jar" >> "$GITHUB_OUTPUT"
          echo "checksum=${jar}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: neofontrender-ui-enhancements-${{ steps.release.outputs.version }}
          path: |
            ${{ steps.artifact.outputs.jar }}
            ${{ steps.artifact.outputs.checksum }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          JAR: ${{ steps.artifact.outputs.jar }}
          CHECKSUM: ${{ steps.artifact.outputs.checksum }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          notes="${RUNNER_TEMP}/ui-enhancements-release-notes.md"
          cat > "$notes" <<'EOF'
          ## NeoFontRender UI Enhancements

          Optional UI enhancement addon for NeoFontRender on Minecraft 1.12.2 / Cleanroom.

          Install the addon JAR alongside the matching NeoFontRender main mod. Do not install the
          `-dev.jar`; the attached unclassified JAR is the remapped, installable distribution.
          EOF

          prerelease_args=()
          if [[ "${MANUAL_PRERELEASE:-false}" == "true" || "$VERSION" =~ (alpha|beta|rc) ]]; then
            prerelease_args+=(--prerelease)
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "NeoFontRender UI Enhancements ${VERSION}" \
              --notes-file "$notes" \
              "${prerelease_args[@]}"
          else
            gh release edit "$TAG" \
              --title "NeoFontRender UI Enhancements ${VERSION}" \
              --notes-file "$notes"
          fi
          gh release upload "$TAG" "$JAR" "$CHECKSUM" --clobber
